  "err_fetch_failed": "⚠️ 𝐅ᴀɪʟᴇᴅ ᴛᴏ ꜰᴇᴛᴄʜ ᴄʜᴀᴛ ɪɴꜰᴏ:\n<i>{error}</i>",

  "err_rtmp_missing_params": "<b>⚠️ 𝐑𝐓𝐌𝐏 𝐃ᴇᴛᴀɪʟꜱ 𝐌ɪꜱꜱɪɴɢ</b>\n\n<i>𝐈ᴛ ʟᴏᴏᴋꜱ ʟɪᴋᴇ ᴀɴ <b>𝐑𝐓𝐌𝐏 ꜱᴛʀᴇᴀᴍ</b> ɪꜱ ᴀᴄᴛɪᴠᴇ ɪɴ ᴛʜɪꜱ ᴄʜᴀᴛ, ʙᴜᴛ ʏᴏᴜ ʜᴀᴠᴇ ɴᴏᴛ ᴘʀᴏᴠɪᴅᴇᴅ ᴛʜᴇ ʀᴇǫᴜɪʀᴇᴅ\n<b>𝐑𝐓𝐌𝐏 𝐔𝐑𝐋</b> ᴏʀ <b>𝐒ᴛʀᴇᴀᴍ 𝐊ᴇʏ</b>. 𝐖ɪᴛʜᴏᴜᴛ ᴛʜᴇꜱᴇ, 𝐈 ᴄᴀɴɴᴏᴛ ꜱᴛᴀʀᴛ ꜱᴛʀᴇᴀᴍɪɴɢ ᴍᴜꜱɪᴄ ᴛᴏ 𝐑𝐓𝐌𝐏.</i>\n\n<b>𝐔ꜱᴇ:</b> <code>/setrtmp [ᴄʜᴀᴛ_ɪᴅ] [ᴜʀʟ+ᴋᴇʏ]</code>\n\n<i>📌 𝐎ɴᴄᴇ ᴛʜᴇ 𝐑𝐓𝐌𝐏 ᴅᴇᴛᴀɪʟꜱ ᴀʀᴇ ꜱᴇᴛ, ʏᴏᴜ ᴍᴀʏ ꜱᴛᴀʀᴛ ꜱᴛʀᴇᴀᴍɪɴɢ.</i>\n<i>➡️ 𝐈ꜰ ʏᴏᴜ ᴅᴏ ɴᴏᴛ ᴡɪꜱʜ ᴛᴏ ᴜꜱᴇ 𝐑𝐓𝐌𝐏, ꜱᴡɪᴛᴄʜ ᴛᴏ ʀᴇɢᴜʟᴀʀ ᴠᴏɪᴄᴇ ᴄʜᴀᴛ ɪɴꜱᴛᴇᴀᴅ.</i>",

  "err_unknown": "⚠️ 𝐔ɴᴋɴᴏᴡɴ 𝐄ʀʀᴏʀ 𝐎ᴄᴄᴜʀʀᴇᴅ:\n<i>{error}</i>",

  "err_fetch_tracks": "⚠️ <b>𝐅ᴀɪʟᴇᴅ ᴛᴏ ꜰᴇᴛᴄʜ ᴛʀᴀᴄᴋ ᴅᴇᴛᴀɪʟꜱ.</b>\n𝐏ʟᴇᴀꜱᴇ ᴛʀʏ ᴀɢᴀɪɴ ʟᴀᴛᴇʀ.",

  "err_download_internal": "⚠️ <b>𝐃ᴏᴡɴʟᴏᴀᴅ ꜰᴀɪʟᴇᴅ</b> ᴅᴜᴇ ᴛᴏ ᴀɴ ᴜɴᴇxᴘᴇᴄᴛᴇᴅ ɪɴᴛᴇʀɴᴀʟ ᴇʀʀᴏʀ.\n𝐏ʟᴇᴀꜱᴇ ᴛʀʏ ᴀɢᴀɪɴ ʟᴀᴛᴇʀ.",

