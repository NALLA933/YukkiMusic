  "voicechat_started": "<b>♻️ 𝐕ᴏɪᴄᴇ ᴄʜᴀᴛ ꜱᴛᴀʀᴛᴇᴅ!</b>\n\n<i>𝐔ꜱᴇ /play [ꜱᴏɴɢ ɴᴀᴍᴇ] ᴛᴏ ᴘʟᴀʏ ᴍᴜꜱɪᴄ.</i>",

  "help_owner": "👑 <b>𝐎ᴡɴᴇʀ 𝐂ᴏᴍᴍᴀɴᴅꜱ</b>\n\n<i>𝐄xᴄʟᴜꜱɪᴠᴇ ᴛᴏᴏʟꜱ ꜰᴏʀ ᴍᴀɴᴀɢɪɴɢ ꜱᴜᴅᴏᴇʀꜱ, ᴇxᴇᴄᴜᴛɪɴɢ ꜱʏꜱᴛᴇᴍ ᴄᴏᴅᴇ, ᴀɴᴅ ᴘᴇʀꜰᴏʀᴍɪɴɢ ʙᴏᴛ ᴀᴅᴍɪɴɪꜱᴛʀᴀᴛɪᴏɴ ꜱᴇᴄᴜʀᴇʟʏ.</i>\n\n<b>𝐂ᴏᴍᴍᴀɴᴅꜱ:</b>\n<blockquote>\n<b>/addsudo</b> - 𝐀ᴅᴅ ᴀ ɴᴇᴡ ᴜꜱᴇʀ ᴛᴏ ʙᴏᴛ'ꜱ ꜱᴜᴅᴏʟɪꜱᴛ\n<b>/delsudo</b> - 𝐑ᴇᴍᴏᴠᴇ ᴀ ᴜꜱᴇʀ ꜰʀᴏᴍ ʙᴏᴛ'ꜱ ꜱᴜᴅᴏʟɪꜱᴛ\n<b>/blockuser</b> - 𝐏ʀᴇᴠᴇɴᴛ ᴜꜱᴇʀ ꜰʀᴏᴍ ᴜꜱɪɴɢ ʙᴏᴛ\n<b>/unblockuser</b> - 𝐀ʟʟᴏᴡ ᴜꜱᴇʀ ᴛᴏ ᴜꜱᴇ ʙᴏᴛ ᴀɢᴀɪɴ\n<b>/blockchat</b> - 𝐏ʀᴇᴠᴇɴᴛ ᴄʜᴀᴛ ꜰʀᴏᴍ ᴜꜱɪɴɢ ʙᴏᴛ\n<b>/unblockchat</b> - 𝐀ʟʟᴏᴡ ᴄʜᴀᴛ ᴛᴏ ᴜꜱᴇ ʙᴏᴛ ᴀɢᴀɪɴ\n<b>/blacklisted</b> - 𝐒ʜᴏᴡ ɢʟᴏʙᴀʟ ʙʟᴀᴄᴋʟɪꜱᴛ\n<b>/eval</b> - 𝐄xᴇᴄᴜᴛᴇ 𝐆ᴏ ᴄᴏᴅᴇ ꜱɴɪᴘᴘᴇᴛꜱ\n<b>/maintenance</b> — 𝐌ᴀɴᴀɢᴇ ᴛʜᴇ ʙᴏᴛ’ꜱ ᴍᴀɪɴᴛᴇɴᴀɴᴄᴇ ᴍᴏᴅᴇ\n<b>/restart</b> — 𝐑ᴇꜱᴛᴀʀᴛ ᴛʜᴇ ʙᴏᴛ\n<b>/sh</b> - 𝐑ᴜɴ ꜱʜᴇʟʟ ᴄᴏᴍᴍᴀɴᴅꜱ\n</blockquote>",

  "help_sudo": "⚡ <b>𝐒ᴜᴅᴏᴇʀ 𝐂ᴏᴍᴍᴀɴᴅꜱ</b>\n\n<i>𝐀ᴅᴠᴀɴᴄᴇᴅ ᴛᴏᴏʟꜱ ꜰᴏʀ ᴍᴀɴᴀɢɪɴɢ ʙᴏᴛ ʙᴇʜᴀᴠɪᴏʀ, ᴍᴏɴɪᴛᴏʀɪɴɢ ᴘᴇʀꜰᴏʀᴍᴀɴᴄᴇ, ᴀɴᴅ ᴄᴏɴᴛʀᴏʟʟɪɴɢ ʟᴏɢɢɪɴɢ ᴀɴᴅ ᴀᴜᴛᴏᴍᴀᴛɪᴏɴ.</i>\n\n<b>𝐂ᴏᴍᴍᴀɴᴅꜱ:</b>\n<blockquote>\n<b>/active</b> - 𝐒ʜᴏᴡꜱ ᴛᴏᴛᴀʟ ᴀᴄᴛɪᴠᴇ ᴄʜᴀᴛꜱ\n<b>/autoleave</b> - 𝐓ᴏɢɢʟᴇ ᴀᴜᴛᴏᴍᴀᴛɪᴄ ᴄʜᴀᴛ ʟᴇᴀᴠɪɴɢ\n<b>/logger</b> - 𝐄ɴᴀʙʟᴇ ᴏʀ ᴅɪꜱᴀʙʟᴇ ʟᴏɢɢᴇʀ\n<b>/stats</b> - 𝐃ɪꜱᴘʟᴀʏ ᴛʜᴇ ʙᴏᴛ & ꜱʏꜱᴛᴇᴍ ꜱᴛᴀᴛꜱ\n<b>/logs</b> - 𝐆ᴇᴛ ᴛʜᴇ ꜱʏꜱᴛᴇᴍ ʟᴏɢꜱ \n</blockquote>",

  "help_admin": "🛠 <b>𝐀ᴅᴍɪɴ 𝐂ᴏᴍᴍᴀɴᴅꜱ</b>\n\n<i>𝐌ᴜꜱɪᴄ ᴀɴᴅ ᴘʟᴀʏʙᴀᴄᴋ ᴄᴏɴᴛʀᴏʟ ᴛᴏᴏʟꜱ ꜰᴏʀ ᴀᴅᴍɪɴꜱ ᴛᴏ ʜᴀɴᴅʟᴇ ᴘʟᴀʏʙᴀᴄᴋ ᴇᴀꜱɪʟʏ.</i>\n\n<b>𝐂ᴏᴍᴍᴀɴᴅꜱ:</b>\n<blockquote>\n<b>/playmode</b> - 𝐂ᴏɴᴛʀᴏʟ ᴡʜᴏ ᴄᴀɴ ᴜꜱᴇ /play\n<b>/cplay</b> - 𝐏ʟᴀʏ ɪɴ ʟɪɴᴋᴇᴅ ᴄʜᴀɴɴᴇʟ ᴠᴏɪᴄᴇ ᴄʜᴀᴛ\n<b>/adminmode</b> - 𝐂ᴏɴᴛʀᴏʟ ᴡʜᴏ ᴄᴀɴ ᴜꜱᴇ ᴀᴅᴍɪɴ ᴄᴏᴍᴍᴀɴᴅꜱ\n<b>/cmddelete</b> - 𝐓ᴏɢɢʟᴇ ᴀᴜᴛᴏᴍᴀᴛɪᴄ ᴅᴇʟᴇᴛɪᴏɴ ᴏꜰ ʙᴏᴛ ᴄᴏᴍᴍᴀɴᴅꜱ\n<b>/settings</b> - 𝐂ᴏɴꜰɪɢᴜʀᴇ ᴄʜᴀᴛ ꜱᴇᴛᴛɪɴɢꜱ\n<b>/speed</b> - 𝐂ʜᴀɴɢᴇ ᴘʟᴀʏʙᴀᴄᴋ ꜱᴘᴇᴇᴅ\n<b>/skip</b> - 𝐒ᴋɪᴘ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ꜱᴏɴɢ\n<b>/pause</b> - 𝐏ᴀᴜꜱᴇ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ᴘʟᴀʏʙᴀᴄᴋ\n<b>/resume</b> - 𝐑ᴇꜱᴜᴍᴇ ᴘᴀᴜꜱᴇᴅ ᴘʟᴀʏʙᴀᴄᴋ\n<b>/replay</b> - 𝐑ᴇᴘʟᴀʏ ᴛʜᴇ ᴄᴜʀʀᴇɴᴛ ꜱᴏɴɢ\n<b>/mute</b> - 𝐌ᴜᴛᴇ ᴘʟᴀʏʙᴀᴄᴋ\n<b>/unmute</b> - 𝐔ɴᴍᴜᴛᴇ ᴘʟᴀʏʙᴀᴄᴋ\n<b>/seek</b> - 𝐒ᴇᴇᴋ ꜰᴏʀᴡᴀʀᴅ ʙʏ ᴀ ꜰᴇᴡ ꜱᴇᴄᴏɴᴅꜱ\n<b>/seekback</b> - 𝐒ᴇᴇᴋ ʙᴀᴄᴋᴡᴀʀᴅ ʙʏ ᴀ ꜰᴇᴡ ꜱᴇᴄᴏɴᴅꜱ\n<b>/jump</b> - 𝐉ᴜᴍᴘ ᴛᴏ ᴀ ɢɪᴠᴇɴ ᴛɪᴍᴇ ɪɴ ᴛʀᴀᴄᴋ\n<b>/move</b> - 𝐌ᴏᴠᴇ ᴀ ǫᴜᴇᴜᴇᴅ ᴛʀᴀᴄᴋ ᴛᴏ ᴀɴᴏᴛʜᴇʀ ᴘᴏꜱɪᴛɪᴏɴ\n<b>/clear</b> - 𝐂ʟᴇᴀʀ ᴀʟʟ ꜱᴏɴɢꜱ ꜰʀᴏᴍ ǫᴜᴇᴜᴇ\n<b>/remove</b> - 𝐑ᴇᴍᴏᴠᴇ ᴀ ꜱᴘᴇᴄɪꜰɪᴄ ᴛʀᴀᴄᴋ ꜰʀᴏᴍ ǫᴜᴇᴜᴇ\n<b>/shuffle</b> - 𝐒ʜᴜꜰꜰʟᴇ ᴀʟʟ ǫᴜᴇᴜᴇᴅ ᴛʀᴀᴄᴋꜱ\n<b>/loop</b> - 𝐄ɴᴀʙʟᴇ ᴏʀ ᴅɪꜱᴀʙʟᴇ ʟᴏᴏᴘɪɴɢ\n<b>/stop</b> - 𝐒ᴛᴏᴘ ᴘʟᴀʏʙᴀᴄᴋ ᴀɴᴅ ʟᴇᴀᴠᴇ 𝐕𝐂\n<b>/nothumb</b> - 𝐄ɴᴀʙʟᴇ ᴏʀ ᴅɪꜱᴀʙʟᴇ ᴀʀᴛᴡᴏʀᴋ/ᴛʜᴜᴍʙɴᴀɪʟ ɪɴ ᴘʟᴀʏʙᴀᴄᴋ ᴍᴇꜱꜱᴀɢᴇꜱ\n</blockquote>",

  "help_public": "🌍 <b>𝐏ᴜʙʟɪᴄ 𝐂ᴏᴍᴍᴀɴᴅꜱ</b>\n\n<i>𝐅ᴇᴀᴛᴜʀᴇꜱ ꜰᴏʀ ᴘʟᴀʏɪɴɢ ꜱᴏɴɢꜱ, ᴠɪᴇᴡɪɴɢ ǫᴜᴇᴜᴇꜱ, ᴄʜᴇᴄᴋɪɴɢ ʟᴀᴛᴇɴᴄʏ, ᴀɴᴅ ʀᴇᴘᴏʀᴛɪɴɢ ʙᴜɢꜱ.</i>\n\n<b>𝐂ᴏᴍᴍᴀɴᴅꜱ:</b>\n<blockquote>\n<b>/play</b> - 𝐏ʟᴀʏ ᴀ ꜱᴏɴɢ\n<b>/queue</b> - 𝐕ɪᴇᴡ ᴀʟʟ ᴛʀᴀᴄᴋꜱ ᴄᴜʀʀᴇɴᴛʟʏ ǫᴜᴇᴜᴇᴅ\n<b>/ping</b> - 𝐂ʜᴇᴄᴋ ʙᴏᴛ’ꜱ ɴᴇᴛᴡᴏʀᴋ ʟᴀᴛᴇɴᴄʏ\n<b>/start</b> - 𝐒ᴛᴀʀᴛ ᴛʜᴇ ʙᴏᴛ\n<b>/help</b> - 𝐒ʜᴏᴡ ʜᴇʟᴘ ᴍᴇɴᴜ\n<b>/bug</b> - 𝐑ᴇᴘᴏʀᴛ ᴀɴ ɪꜱꜱᴜᴇ ᴏʀ ᴘʀᴏʙʟᴇᴍ\n<b>/position</b> - 𝐒ʜᴏᴡ ᴄᴜʀʀᴇɴᴛ ᴛʀᴀᴄᴋ’ꜱ ᴛɪᴍᴇꜱᴛᴀᴍᴘ\n<b>/reload</b> - 𝐑ᴇʟᴏᴀᴅ ᴀᴅᴍɪɴ ᴏʀ ᴄᴀᴄʜᴇ ᴅᴀᴛᴀ\n<b>/json</b> - 𝐒ʜᴏᴡ ᴍᴇꜱꜱᴀɢᴇ 𝐉𝐒𝐎𝐍 ꜱᴛʀᴜᴄᴛᴜʀᴇ\n<b>/sudolist</b> - 𝐕ɪᴇᴡ ꜱᴜᴅᴏ ᴜꜱᴇʀ ʟɪꜱᴛ\n</blockquote>"
}