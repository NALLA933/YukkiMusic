  "err_admin_permission_required": "⚠️ <b>𝐀ᴅᴍɪɴ 𝐏ᴇʀᴍɪꜱꜱɪᴏɴ 𝐑ᴇǫᴜɪʀᴇᴅ</b>\n\n𝐈 ɴᴇᴇᴅ ᴀᴅᴍɪɴ ᴀᴄᴄᴇꜱꜱ ᴡɪᴛʜ 𝐈ɴᴠɪᴛᴇ 𝐔ꜱᴇʀꜱ ᴘᴇʀᴍɪꜱꜱɪᴏɴ ᴛᴏ ᴍᴀɴᴀɢᴇ ᴀɴᴅ ɪɴᴠɪᴛᴇ ᴀꜱꜱɪꜱᴛᴀɴᴛ ɪɴ ᴛʜɪꜱ ᴄʜᴀᴛ.",

  "err_assistant_get_failed": "⚠️ 𝐓ʜᴇ ꜱʏꜱᴛᴇᴍ ᴄᴏᴜʟᴅ ɴᴏᴛ ᴀꜱꜱɪɢɴ ᴀɴ ᴀꜱꜱɪꜱᴛᴀɴᴛ ᴛᴏ ᴛʜɪꜱ ᴄʜᴀᴛ.\n\n<i>𝐓ʜɪꜱ ɪꜱ ᴜꜱᴜᴀʟʟʏ ᴀ ᴛᴇᴍᴘᴏʀᴀʀʏ ɪꜱꜱᴜᴇ ᴀɴᴅ ꜱʜᴏᴜʟᴅ ʀᴇꜱᴏʟᴠᴇ ʙʏ ᴛʀʏɪɴɢ ᴀɢᴀɪɴ.</i>\n\n<b>➡️ 𝐏ʟᴇᴀꜱᴇ ʀᴇᴛʀʏ ʏᴏᴜʀ ᴄᴏᴍᴍᴀɴᴅ.</b>\n\n<i>𝐈ꜰ ᴛʜɪꜱ ᴋᴇᴇᴘꜱ ʜᴀᴘᴘᴇɴɪɴɢ, ᴘʟᴇᴀꜱᴇ ᴄᴏɴᴛᴀᴄᴛ ꜱᴜᴘᴘᴏʀᴛ ꜱᴏ ᴡᴇ ᴄᴀɴ ᴀꜱꜱɪꜱᴛ ʏᴏᴜ.</i>",

  "err_assistant_join_request_sent": "⚠️ 𝐀ꜱꜱɪꜱᴛᴀɴᴛ ꜱᴇɴᴛ ᴀ ᴊᴏɪɴ ʀᴇǫᴜᴇꜱᴛ, ʙᴜᴛ 𝐈 ᴄᴏᴜʟᴅ ɴᴏᴛ ᴀᴜᴛᴏ-ᴀᴘᴘʀᴏᴠᴇ ɪᴛ.\n\n<i>✅ 𝐏ʟᴇᴀꜱᴇ ᴀᴘᴘʀᴏᴠᴇ ᴛʜᴇ ʀᴇǫᴜᴇꜱᴛ ᴍᴀɴᴜᴀʟʟʏ, ᴛʜᴇɴ ᴛʀʏ ᴀɢᴀɪɴ.</i>",

  "err_assistant_invite_link_fetch": "⚠️ 𝐅ᴀɪʟᴇᴅ ᴛᴏ ꜰᴇᴛᴄʜ ɪɴᴠɪᴛᴇ ʟɪɴᴋ:\n<i>{error}</i>",

