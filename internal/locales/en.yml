  "err_connection_timeout": "⚠️ <b>𝐕ᴏɪᴄᴇ𝐂ʜᴀᴛ 𝐂ᴏɴɴᴇᴄᴛɪᴏɴ 𝐓ɪᴍᴇᴏᴜᴛ</b>\n\n𝐓ᴇʟᴇɢʀᴀᴍ ɪꜱ ɴᴏᴛ ʀᴇꜱᴘᴏɴᴅɪɴɢ ᴘʀᴏᴘᴇʀʟʏ ᴛᴏ ᴛʜᴇ ᴠᴏɪᴄᴇ ᴄʜᴀᴛ ᴄᴏɴɴᴇᴄᴛɪᴏɴ ʀɪɢʜᴛ ɴᴏᴡ.\n\n<i>𝐈ꜰ ᴛʜɪꜱ ᴋᴇᴇᴘꜱ ʜᴀᴘᴘᴇɴɪɴɢ, ᴇɴᴅ ᴛʜᴇ ᴠᴏɪᴄᴇ ᴄʜᴀᴛ ᴀɴᴅ ꜱᴛᴀʀᴛ ɪᴛ ᴀɢᴀɪɴ, ᴛʜᴇɴ ʀᴇᴛʀʏ.</i>",

