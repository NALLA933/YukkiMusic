  "supergroup_needed": "𝐓ʜɪꜱ ᴄʜᴀᴛ (𝐈𝐃: <code>{chat_id}</code>) ɪꜱ ɴᴏᴛ ᴀ 𝐒ᴜᴘᴇʀ𝐆ʀᴏᴜᴘ ʏᴇᴛ.\n\n<i>⚠️ 𝐏ʟᴇᴀꜱᴇ ᴄᴏɴᴠᴇʀᴛ ᴛʜɪꜱ ɢʀᴏᴜᴘ ɪɴᴛᴏ ᴀ 𝐒ᴜᴘᴇʀ𝐆ʀᴏᴜᴘ, ᴛʜᴇɴ ᴀᴅᴅ ᴍᴇ ᴀɢᴀɪɴ ᴀꜱ ᴀɴ ᴀᴅᴍɪɴ.</i>\n\n<b>𝐇ᴏᴡ ᴛᴏ ᴄᴏɴᴠᴇʀᴛ?</b>\n<a href=\"https://te.legra.ph/How-to-Convert-a-Group-to-a-Supergroup-01-02\">🔗 𝐆ᴏ ᴛᴏ ᴛʜᴇ ɢᴜɪᴅᴇ</a>\n\n𝐈ꜰ ʏᴏᴜ ꜱᴛɪʟʟ ꜰᴀᴄᴇ ᴀɴʏ ɪꜱꜱᴜᴇꜱ, ᴊᴏɪɴ ᴏᴜʀ <a href=\"{support_group}\">ꜱᴜᴘᴘᴏʀᴛ ɢʀᴏᴜᴘ.</a>",

